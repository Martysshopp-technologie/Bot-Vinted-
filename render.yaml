services:
  - type: web
    name: vinted-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: VINTED_DOMAIN
        value: www.vinted.fr
      - key: POLL_INTERVAL
        value: "60"
      - key: DB_PATH
        value: /data/vinted_bot.db
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: vinted-bot
          property: host
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
